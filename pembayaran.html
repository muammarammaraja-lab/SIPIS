<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Pembayaran — SFMS Lite</title>
<link rel="stylesheet" href="css/style.css" />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700&display=swap" rel="stylesheet">
</head>
<body>
  <div class="app-shell">
    <aside class="sidebar" id="sidebar">
      <div class="brand">SFMS Lite<small data-school-name>Memuat...</small></div>
      <nav>
        <a href="dashboard.html">Dashboard</a>
        <a href="siswa.html">Data Siswa</a>
        <a href="jenis-tagihan.html">Jenis Tagihan</a>
        <a href="tagihan.html">Tagihan</a>
        <a href="pembayaran.html" class="active">Pembayaran</a>
        <a href="template.html">Template WA</a>
        <a href="users.html" data-roles="kepala_sekolah,super_admin">Manajemen User</a>
        <a href="audit-log.html" data-roles="kepala_sekolah,super_admin">Audit Log</a>
      </nav>
      <div class="user-box">
        <div data-user-name>...</div>
        <div class="role" data-user-role>...</div>
        <button data-logout>Keluar</button>
      </div>
    </aside>

    <main class="main">
      <div class="topbar">
        <h1>Pembayaran</h1>
        <button class="btn btn-primary" id="btnAdd" data-roles="kepala_sekolah,bendahara,admin_keuangan">+ Input Pembayaran Manual</button>
      </div>
      <div class="content">
        <div class="panel" style="margin-bottom:20px" data-roles="kepala_sekolah,bendahara">
          <div class="panel-head"><h2>Menunggu Verifikasi</h2></div>
          <div class="panel-body" id="pendingWrap">Memuat...</div>
        </div>

        <div class="panel">
          <div class="panel-head">
            <h2>Riwayat Pembayaran</h2>
            <button class="btn btn-ghost btn-sm" id="btnExport">Export CSV</button>
          </div>
          <div class="panel-body" id="historyWrap">Memuat...</div>
        </div>
      </div>
    </main>
  </div>

  <!-- Modal input pembayaran manual -->
  <div id="modalOverlay" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,0.4);align-items:center;justify-content:center;z-index:100">
    <div style="background:#fff;border-radius:12px;padding:24px;width:420px;max-width:90%">
      <h2 style="margin-top:0;font-size:16px">Input Pembayaran Manual</h2>
      <form id="paymentForm">
        <label>Pilih Tagihan (siswa - sisa tagihan)</label>
        <select id="p_bill" required></select>
        <label>Nominal Dibayar (Rp)</label>
        <input type="number" id="p_amount" required />
        <label>Metode</label>
        <select id="p_method">
          <option value="manual_transfer">Transfer Bank</option>
          <option value="tunai">Tunai</option>
        </select>
        <label>Bukti Transfer (opsional, gambar/PDF)</label>
        <input type="file" id="p_proof" accept="image/*,application/pdf" />
        <div style="display:flex;gap:10px;justify-content:flex-end;margin-top:8px">
          <button type="button" class="btn btn-ghost" id="btnCancel">Batal</button>
          <button type="submit" class="btn btn-primary">Simpan</button>
        </div>
      </form>
    </div>
  </div>

  <script type="module" src="js/pembayaran.js"></script>
</body>
</html>
