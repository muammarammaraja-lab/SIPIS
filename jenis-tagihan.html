<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Jenis Tagihan — SFMS Lite</title>
<link rel="stylesheet" href="css/style.css" />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700&display=swap" rel="stylesheet">
</head>
<body>
  <div class="app-shell">
    <aside class="sidebar" id="sidebar">
      <div class="brand">SFMS Lite<small data-school-name>Memuat...</small></div>
      <nav>
        <a href="dashboard.html">Dashboard</a>
        <a href="siswa.html">Data Siswa</a>
        <a href="orangtua.html">Data Orang Tua</a>
        <a href="jenis-tagihan.html" class="active">Jenis Tagihan</a>
        <a href="tagihan.html">Tagihan</a>
        <a href="pembayaran.html">Pembayaran</a>
        <a href="template.html">Template WA</a>
        <a href="laporan.html">Laporan</a>
        <a href="users.html" data-roles="kepala_sekolah,super_admin">Manajemen User</a>
        <a href="audit-log.html" data-roles="kepala_sekolah,super_admin">Audit Log</a>
      </nav>
      <div class="user-box">
        <div data-user-name>...</div>
        <div class="role" data-user-role>...</div>
        <button data-logout>Keluar</button>
      </div>
    </aside>

    <main class="main">
      <div class="topbar">
        <h1>Jenis Tagihan</h1>
        <button class="btn btn-primary" id="btnAdd" data-roles="kepala_sekolah,bendahara,admin_keuangan">+ Tambah Jenis Tagihan</button>
      </div>
      <div class="content">
        <div class="panel">
          <div class="panel-head"><h2>Daftar Jenis Tagihan</h2></div>
          <div class="panel-body" id="tableWrap">Memuat...</div>
        </div>
      </div>
    </main>
  </div>

  <div id="modalOverlay" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,0.4);align-items:center;justify-content:center;z-index:100">
    <div style="background:#fff;border-radius:12px;padding:24px;width:400px;max-width:90%">
      <h2 style="margin-top:0;font-size:16px" id="modalTitle">Tambah Jenis Tagihan</h2>
      <form id="form">
        <input type="hidden" id="f_id" />
        <label>Nama Tagihan</label>
        <input type="text" id="f_name" placeholder="contoh: SPP Bulanan" required />
        <label>Mode Penagihan</label>
        <select id="f_mode">
          <option value="berkala">Berkala (Bulanan)</option>
          <option value="sekali_bayar">Sekali Bayar</option>
          <option value="cicilan">Cicilan</option>
        </select>
        <label>Nominal Default (Rp)</label>
        <input type="number" id="f_amount" required />
        <label style="display:flex;align-items:center;gap:8px;font-weight:400">
          <input type="checkbox" id="f_active" style="width:auto;margin:0" checked /> Aktif (muncul di pilihan generate tagihan)
        </label>
        <div style="display:flex;gap:10px;justify-content:flex-end;margin-top:8px">
          <button type="button" class="btn btn-ghost" id="btnCancel">Batal</button>
          <button type="submit" class="btn btn-primary">Simpan</button>
        </div>
      </form>
    </div>
  </div>

  <script type="module" src="js/jenisTagihan.js"></script>
</body>
</html>
