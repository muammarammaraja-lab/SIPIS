<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Audit Log — SFMS Lite</title>
<link rel="stylesheet" href="css/style.css" />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700&display=swap" rel="stylesheet">
</head>
<body>
  <div class="app-shell">
    <aside class="sidebar" id="sidebar">
      <div class="brand">SFMS Lite<small data-school-name>Memuat...</small></div>
      <nav>
        <a href="dashboard.html">Dashboard</a>
        <a href="siswa.html">Data Siswa</a>
        <a href="orangtua.html">Data Orang Tua</a>
        <a href="jenis-tagihan.html">Jenis Tagihan</a>
        <a href="tagihan.html">Tagihan</a>
        <a href="pembayaran.html">Pembayaran</a>
        <a href="template.html">Template WA</a>
        <a href="laporan.html">Laporan</a>
        <a href="users.html" data-roles="kepala_sekolah,super_admin">Manajemen User</a>
        <a href="audit-log.html" class="active" data-roles="kepala_sekolah,super_admin">Audit Log</a>
      </nav>
      <div class="user-box">
        <div data-user-name>...</div>
        <div class="role" data-user-role>...</div>
        <button data-logout>Keluar</button>
      </div>
    </aside>

    <main class="main">
      <div class="topbar"><h1>Audit Log</h1></div>
      <div class="content">
        <div class="panel">
          <div class="panel-head">
            <h2>Riwayat Aktivitas</h2>
            <select id="filterEntity" style="width:200px;margin:0">
              <option value="">Semua Modul</option>
              <option value="students">Data Siswa</option>
              <option value="bills">Tagihan</option>
              <option value="payments">Pembayaran</option>
              <option value="billing_types">Jenis Tagihan</option>
            </select>
          </div>
          <div class="panel-body" id="logWrap">Memuat...</div>
        </div>
      </div>
    </main>
  </div>

  <!-- Modal detail before/after -->
  <div id="detailOverlay" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,0.4);align-items:center;justify-content:center;z-index:100">
    <div style="background:#fff;border-radius:12px;padding:24px;width:600px;max-width:90%;max-height:80vh;overflow:auto">
      <h2 style="margin-top:0;font-size:16px">Detail Perubahan</h2>
      <div style="display:flex;gap:14px;flex-wrap:wrap">
        <div style="flex:1;min-width:240px">
          <div class="label" style="font-size:12px;color:var(--grey-700);margin-bottom:6px">Sebelum</div>
          <pre id="beforeData" style="background:var(--grey-100);padding:10px;border-radius:8px;font-size:11.5px;white-space:pre-wrap;word-break:break-all"></pre>
        </div>
        <div style="flex:1;min-width:240px">
          <div class="label" style="font-size:12px;color:var(--grey-700);margin-bottom:6px">Sesudah</div>
          <pre id="afterData" style="background:var(--grey-100);padding:10px;border-radius:8px;font-size:11.5px;white-space:pre-wrap;word-break:break-all"></pre>
        </div>
      </div>
      <div style="display:flex;justify-content:flex-end;margin-top:14px">
        <button class="btn btn-ghost" id="btnCloseDetail">Tutup</button>
      </div>
    </div>
  </div>

  <script type="module" src="js/auditLog.js"></script>
</body>
</html>
