<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Login — SFMS Lite</title>
<link rel="stylesheet" href="css/style.css" />
</head>
<body>
<div class="login-wrap">
  <div class="login-card">
    <div class="login-logo">
      <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
    </div>
    <h1>SFMS Lite</h1>
    <p class="sub">Sistem Manajemen Keuangan Sekolah</p>
    <div id="errMsg" class="error" style="display:none"></div>
    <label>Email</label>
    <input type="email" id="email" placeholder="email@sekolah.sch.id" required autocomplete="email" />
    <label>Password</label>
    <input type="password" id="password" placeholder="••••••••" required autocomplete="current-password" />
    <button class="btn btn-primary" id="btnLogin" style="width:100%;margin-top:4px">Masuk</button>
  </div>
</div>
<script type="module" src="js/auth.js"></script>
</body>
</html>
