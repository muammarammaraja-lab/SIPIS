  <main class="main">
    <div class="topbar">
      <div class="topbar-left">
        <button class="btn-hamburger" id="btnMenu" aria-label="Buka menu"><svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="18" x2="21" y2="18"/></svg></button>
        <h1>Data Siswa</h1>
      </div>
      <div class="topbar-actions" id="topbarActions"></div>
    </div>
    <div class="content">
      <div class="panel">
        <div class="panel-head">
          <h2>Daftar Siswa</h2>
          <div style="display:flex;gap:8px;align-items:center">
            <input type="text" id="searchBox" placeholder="Cari nama / NIS..." style="width:200px;margin:0" />
            <button class="btn btn-primary btn-sm" id="btnAdd" data-roles="kepala_sekolah,bendahara,admin_keuangan,operator_sekolah">+ Tambah Siswa</button>
          </div>
        </div>
        <div class="panel-body">
          <div class="table-wrap table-desktop" id="studentTableWrap">Memuat...</div>
          <div class="card-list" id="studentCardList"></div>
        </div>
      </div>

<div id="modalOverlay" style="display:none;position:fixed;inset:0;background:rgba(10,20,40,0.50);align-items:center;justify-content:center;z-index:100;padding:20px;backdrop-filter:blur(3px)">
  <div class="modal-box">
    <div class="modal-header">
      <h2><span id="modalTitle">Tambah Siswa</span></h2>
      <button class="modal-close" id="btnCancel" aria-label="Tutup">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </div>
    <form id="studentForm">
      <input type="hidden" id="studentId" />
      <label>Nama Lengkap</label>
      <input type="text" id="f_name" required placeholder="Nama lengkap siswa" />
      <label>NIS</label>
      <input type="text" id="f_nis" placeholder="Nomor Induk Siswa" />
      <label>NISN</label>
      <input type="text" id="f_nisn" placeholder="Nomor Induk Siswa Nasional" />
      <label>Kelas</label>
      <select id="f_class_id"><option value="">-- Pilih Kelas --</option></select>
      <label>Nama Orang Tua / Wali</label>
      <input type="text" id="f_parent_name" placeholder="Nama orang tua atau wali" />
      <label>No. WhatsApp Orang Tua <span style="color:var(--red)">*</span></label>
      <input type="text" id="f_parent_whatsapp" placeholder="+6281234567890" required />
      <div class="form-hint">Format: +62xxx (dengan kode negara)</div>
      <label>Email Orang Tua (opsional)</label>
      <input type="email" id="f_parent_email" placeholder="email@contoh.com" />
      <div class="modal-footer">
        <button type="button" class="btn btn-ghost" id="btnCancel2">Batal</button>
        <button type="submit" class="btn btn-primary">Simpan</button>
      </div>
    </form>
  </div>
</div>

<script type="module" src="js/siswa.js"></script>
<script>
  const btnMenu = document.getElementById("btnMenu");
  const sidebar = document.getElementById("sidebar");
  const overlay = document.getElementById("sidebarOverlay");
  function openSidebar()  { sidebar.classList.add("open"); overlay.classList.add("active"); document.body.style.overflow="hidden"; }
  function closeSidebar() { sidebar.classList.remove("open"); overlay.classList.remove("active"); document.body.style.overflow=""; }
  btnMenu.addEventListener("click", () => sidebar.classList.contains("open") ? closeSidebar() : openSidebar());
  overlay.addEventListener("click", closeSidebar);
  document.addEventListener("keydown", e => { if (e.key==="Escape") closeSidebar(); });

</script>
